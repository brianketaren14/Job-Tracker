<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI Job Tracker{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  {% block extra_head %}{% endblock %}
</head>

<body>

  <!-- ── Navigation ── -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="brand-icon">⚡</span>
        <span class="brand-text">AI Job Tracker</span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Jobs</a>
        <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">Dashboard</a>
      </div>
    </div>
  </nav>

  <!-- ── Main Content ── -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ── -->
  <footer class="footer">
    <p>Powered by <strong>CrewAI</strong> × <strong>Groq</strong> × <strong>Supabase</strong></p>
  </footer>

  {% block extra_scripts %}{% endblock %}
</body>
<script>
  const jobDates = document.querySelectorAll(".job-date");

  jobDates.forEach(el => {
    const date = new Date(el.textContent.trim());

    // Format: YYYY-MM-DD HH:MM
    const formatted = date.toISOString().slice(0, 16).replace("T", " ");

    // Tampilkan hasil format ke dalam elemen
    el.textContent = formatted;
  });

</script>

</html>
